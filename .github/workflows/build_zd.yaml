name: 构建和发布 Aseprite（Windows）

on:
  workflow_dispatch:
    inputs:
      aseprite-ref:
        description: 'Aseprite 的分支或标签（Branch 或 Tag）'
        required: true
        type: string
      skia-ref:
        description: 'Skia 的分支或标签（Branch 或 Tag）'
        required: true
        type: string

jobs:
  build-aseprite:
    name: 构建 Aseprite（Windows）
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖项
        shell: powershell
        run: |
          # 安装 Windows 所需的依赖项
          choco upgrade wget -y --no-progress

      - name: 下载 Aseprite 源代码
        uses: actions/checkout@v4
        with:
          repository: https://github.com/aseprite/aseprite
          path: aseprite-source
          ref: ${{ github.event.inputs.aseprite-ref }} # 使用用户指定的分支或标签

      - name: 下载 Skia 库
        uses: actions/checkout@v4
        with:
          repository: https://github.com/aseprite/skia.git
          path: skia
          ref: ${{ github.event.inputs.skia-ref }} # 使用用户指定的分支或标签

      - name: 使用 CMake 配置构建环境
        shell: bash
        working-directory: aseprite-source
        run: |
          # 配置 CMake 构建文件
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_SCRIPTING=OFF \
            -DLAF_BACKEND=skia \
            -DSKIA_DIR=../skia \
            -DSKIA_LIBRARY_DIR=../skia/out/Release-x64

      - name: 编译
        shell: bash
        working-directory: aseprite-source/build
        run: |
          # 使用 Ninja 编译项目
          ninja

      - name: 生成当前中国时间
        id: time
        shell: powershell
        run: |
          $currentTime = Get-Date -Format "yyyy.MM.dd-HH.mm"
          echo "current_time=$currentTime" >> $env:GITHUB_ENV

      - name: 创建发布文件
        working-directory: aseprite-source/build/bin
        run: |
          # 创建包含构建结果的 ZIP 文件
          7z -tzip a "Aseprite-${{ env.current_time }}-Windows.zip" *

      - name: 上传发布文件
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: "aseprite-source\\build\\bin\\Aseprite-${{ env.current_time }}-Windows.zip"
          asset_name: "Aseprite-${{ env.current_time }}-Windows.zip"
          tag: ${{ env.current_time }}
