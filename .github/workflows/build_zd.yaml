name: 构建和发布 Aseprite（Windows）

on:
  workflow_dispatch:
    inputs:
      source-code-url:
        description: 'Aseprite 源代码下载链接'
        required: true
        type: string
      skia-library-url:
        description: 'Skia 库下载链接（Windows 版）'
        required: true
        type: string

jobs:
  build-aseprite:
    name: 构建 Aseprite（Windows）
    runs-on: windows-latest
    env:
      # 动态生成当前的中国时间标签
      RELEASE_TAG: ${{ format(dateFormat('yyyy.MM.dd-HH.mm', github.event.run_started_at, 'Asia/Shanghai')) }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖项
        shell: powershell
        run: |
          # 安装 Windows 所需的依赖项
          choco install wget -y --no-progress

      - name: 下载 Aseprite 源代码
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.source-code-url }}
          path: aseprite-source

      - name: 解压 Aseprite 源代码
        shell: powershell
        run: |
          Expand-Archive -Path "aseprite-source\Aseprite-Source.zip" -DestinationPath "aseprite"

      - name: 下载 Skia 库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.skia-library-url }}
          path: skia

      - name: 解压 Skia 库
        shell: powershell
        run: |
          Expand-Archive -Path "skia\Skia-Windows-Release-x64.zip" -DestinationPath "aseprite\skia"

      - name: 安装 Ninja
        uses: aseprite/get-ninja@main

      - name: 安装 MSVC 开发环境
        uses: ilammy/msvc-dev-cmd@v1

      - name: 生成构建文件
        shell: bash
        working-directory: aseprite
        run: |
          export enable_ccache=off
          export laf_backend=skia
          export enable_scripting=off
          export skia_arch=x64

          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_TESTS=OFF \
            -DENABLE_SCRIPTING=$enable_scripting \
            -DENABLE_CCACHE=$enable_ccache \
            -DLAF_BACKEND=$laf_backend \
            -DSKIA_DIR=skia \
            -DSKIA_LIBRARY_DIR=skia/out/Release-$skia_arch

      - name: 编译
        shell: bash
        working-directory: aseprite
        run: |
          cd build && ninja

      - name: 清理构建文件夹
        working-directory: aseprite\build\bin
        shell: bash
        run: |
          find . -mindepth 1 ! \( -name 'aseprite.exe' -o -name 'data' -prune \) -exec rm -rf {} +

      - name: 创建便携版 ZIP 文件
        working-directory: aseprite\build\bin
        run: |
          echo '# 这个文件使 Aseprite 行为像便携版程序' > aseprite.ini

      - name: 创建发布文件
        working-directory: aseprite\build\bin
        run: |
          7z -tzip a "Aseprite-${{ env.RELEASE_TAG }}-Windows.zip" *

      - name: 上传发布文件
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: "aseprite\\build\\bin\\Aseprite-${{ env.RELEASE_TAG }}-Windows.zip"
          asset_name: "Aseprite-${{ env.RELEASE_TAG }}-Windows.zip"
          tag: ${{ env.RELEASE_TAG }}
